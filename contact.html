    <div class="container">
        <h1>Связаться с нами</h1>
        <p>Есть вопросы по работе калькулятора? Напишите нам!</p>
        
        <form id="contactForm" style="display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto;">
            <input type="text" id="name" placeholder="Ваше имя" required>
            <input type="email" id="email" placeholder="Ваш Email" required>
            <textarea id="message" placeholder="Ваше сообщение" style="padding: 10px; border-radius: 8px; border: 1px solid #ddd; height: 100px;"></textarea>
            <button type="submit">Отправить сообщение</button>
        </form>
        
        <div id="formStatus" style="margin-top: 20px; font-weight: bold; color: #27ae60;"></div>
    </div>

    <script src="script.js"></script>
